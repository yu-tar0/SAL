<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>kubota preview</title>
<style>
:root {
  --page-bg: #F6F9F9;
  --paper-bg: #FFFFFF;
  --ink: #1D3535;
  --muted: #5E7D7D;
  --accent: #00A8A9;
  --line: #D7E5E5;
  --soft: #EBF7F7;
  --warn: #8A5A00;
  --warn-bg: #FFF4D8;
}
body {
  margin: 0;
  background: var(--page-bg);
  color: var(--ink);
  padding: 32px;
  font-family: system-ui, "Noto Sans JP", sans-serif;
  line-height: 1.7;
}
.paper {
  background: var(--paper-bg);
  max-width: 760px;
  margin: 0 auto;
  padding: 40px 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
}
h1 {
  font-size: 30px;
  margin: 0 0 6px;
  padding-bottom: 12px;
  border-bottom: 4px solid var(--accent);
}
h2 { color: var(--accent); font-size: 20px; margin: 28px 0 8px; }
p, li { color: var(--muted); }
a { color: var(--accent); }
.soft { background: var(--soft); border-left: 6px solid var(--accent); padding: 14px 18px; margin: 16px 0; }
.warn { background: var(--warn-bg); border-left: 6px solid var(--warn); padding: 14px 18px; margin: 16px 0; }
table { width: 100%; border-collapse: collapse; margin: 18px 0; }
th { background: var(--accent); color: var(--paper-bg); text-align: left; padding: 9px 12px; }
td { border-bottom: 1px solid var(--line); padding: 9px 12px; }
.swatches { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }
.chip { height: 42px; border: 1px solid var(--line); border-radius: 6px; }
.label { color: var(--muted); font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<main class="paper">
<h1>kubota</h1>
<p>kubota theme generated faithfully from image colors.</p>
<h2>本文サンプル</h2>
<p>本文は ink と muted を使い、<a href="#">リンクや強調</a>には accent を使います。</p>
<div class="soft">通常の強調ボックスです。</div>
<div class="warn">注意喚起のボックスです。</div>
<table><tr><th>項目</th><th>値</th></tr><tr><td>Alpha</td><td>123</td></tr><tr><td>Beta</td><td>456</td></tr></table>
<div class="swatches"><div><div class="chip" style="background:#F6F9F9"></div><div class="label">page_bg<br>#F6F9F9</div></div><div><div class="chip" style="background:#FFFFFF"></div><div class="label">paper_bg<br>#FFFFFF</div></div><div><div class="chip" style="background:#1D3535"></div><div class="label">ink<br>#1D3535</div></div><div><div class="chip" style="background:#5E7D7D"></div><div class="label">muted<br>#5E7D7D</div></div><div><div class="chip" style="background:#00A8A9"></div><div class="label">accent<br>#00A8A9</div></div><div><div class="chip" style="background:#D7E5E5"></div><div class="label">line<br>#D7E5E5</div></div><div><div class="chip" style="background:#EBF7F7"></div><div class="label">soft<br>#EBF7F7</div></div><div><div class="chip" style="background:#8A5A00"></div><div class="label">warn<br>#8A5A00</div></div><div><div class="chip" style="background:#FFF4D8"></div><div class="label">warn_bg<br>#FFF4D8</div></div></div>
</main>
</body>
</html>
